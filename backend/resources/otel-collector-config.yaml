receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - "http://localhost:5372"
            - "http://127.0.0.1:5372"
            - "http://localhost:5173"
            - "http://localhost:3000"
            - "http://127.0.0.1:5173"
            - "http://127.0.0.1:3000"
            - "http://localhost:8000"
          allowed_headers:
            - "*"

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
  memory_limiter:
    check_interval: 1s
    limit_mib: 1024
    spike_limit_mib: 256
  transform/logs:
    log_statements:
      - context: log
        statements:
          - set(attributes["message"], body.string)
          - set(attributes["log.body"], body.string)

exporters:
  prometheus:
    endpoint: "0.0.0.0:8889"
    send_timestamps: true
    metric_expiration: 5m
    resource_to_telemetry_conversion:
      enabled: true
  otlphttp/victorialogs:
    logs_endpoint: "http://victoria-logs:9428/insert/opentelemetry/v1/logs"
  otlp/jaeger:
    endpoint: "jaeger:4317"
    tls:
      insecure: true

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1888
  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [ health_check, pprof, zpages ]
  pipelines:
    metrics:
      receivers: [ otlp ]
      processors: [ batch ]
      exporters: [ prometheus ]
    logs:
      receivers: [ otlp ]
      processors: [ transform/logs, batch ]
      exporters: [ otlphttp/victorialogs ]
    traces:
      receivers: [ otlp ]
      processors: [ batch ]
      exporters: [ otlp/jaeger ]
  telemetry:
    logs:
      level: "info"
      encoding: "json"
    metrics:
      level: "normal"
      readers:
        - pull:
            exporter:
              prometheus:
                host: '0.0.0.0'
                port: 8888
